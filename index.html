<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempus: relógio e cronômetro</title>
    <link rel="shortcut icon" href="./assets/icons/clock.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="body-container">
      <div
        class="nav flex-column nav-pills menu"
        id="v-pills-tab"
        role="tablist"
        aria-orientation="vertical"
      >
        <button
          class="nav-link active"
          id="v-pills-clock-tab"
          data-bs-toggle="pill"
          data-bs-target="#v-pills-clock"
          type="button"
          role="tab"
          aria-controls="v-pills-clock"
          aria-selected="true"
        >
          <i class="fa-solid fa-clock" aria-hidden="true"></i>
          Relógio
        </button>

        <button
          class="nav-link"
          id="v-pills-stopwatch-tab"
          data-bs-toggle="pill"
          data-bs-target="#v-pills-stopwatch"
          type="button"
          role="tab"
          aria-controls="v-pills-stopwatch"
          aria-selected="false"
        >
          <i class="fa-solid fa-stopwatch" aria-hidden="true"></i>
          Cronômetro
        </button>
      </div>

      <div class="tab-content" id="v-pills-tabContent">
        <div
          class="tab-pane fade show active"
          id="v-pills-clock"
          role="tabpanel"
          aria-labelledby="v-pills-clock-tab"
        >
          <div class="content">
            <div class="content-background">
              <div class="content-time">
                <div class="hours-group">
                  <span id="time" class="time"></span>
                  <span id="date" class="date"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div
          class="tab-pane fade"
          id="v-pills-stopwatch"
          role="tabpanel"
          aria-labelledby="v-pills-stopwatch-tab"
        >
          <div class="content">
            <div class="content-stopwatch">
              <div class="content-background">
                <div class="content-icon"></div>
                <div class="content-time">
                  <div class="stopwatch">
                    <span id="sw-hours">00</span>:<span
                      id="sw-minutes"
                      >00</span
                    >:<span class="seconds" id="sw-seconds">00</span>
                    <span class="separator">.</span>
                    <span class="seconds" id="sw-milliseconds">00</span>
                  </div>

                  <button id="reset" class="d-none reset" type="button">
                    Reset
                  </button>
                </div>
              </div>

              <div class="button-group">
                <button id="start" class="button" type="button" aria-label="Iniciar">
                  <img width="16" height="16" src="./assets/icons/play.png" alt="Iniciar" />
                </button>

                <button id="pause" class="button d-none" type="button" aria-label="Pausar">
                  <img width="16" height="16" src="./assets/icons/pause.png" alt="Pausar" />
                </button>

                <button id="flag" class="button d-none" type="button" aria-label="Registrar volta">
                  <img width="16" height="16" src="./assets/icons/flag.png" alt="Volta" />
                </button>
              </div>
            </div>

            <div class="laps-wrapper">
              <ol id="laps"></ol>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./index.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
